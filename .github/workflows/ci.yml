name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      MONGODB_URL: 'mongodb://localhost:27017/xclone-ci'
      NEXTAUTH_URL: 'http://localhost:3000'
      NEXTAUTH_SECRET: 'ci-placeholder-secret'
      GOOGLE_CLIENT_ID: 'ci-placeholder-id'
      GOOGLE_CLIENT_SECRET: 'ci-placeholder-secret'
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: 'ci-placeholder'
      NEXT_PUBLIC_SERVER_URL: 'http://localhost:5000'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run build

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run deps:check
