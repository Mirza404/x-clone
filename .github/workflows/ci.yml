name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm test
      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/lcov-report/
          if-no-files-found: ignore
      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov-report/
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      MONGODB_URL: 'mongodb://localhost:27017/xclone-ci'
      NEXTAUTH_URL: 'http://localhost:3000'
      NEXTAUTH_SECRET: 'ci-placeholder-secret'
      GOOGLE_CLIENT_ID: 'ci-placeholder-id'
      GOOGLE_CLIENT_SECRET: 'ci-placeholder-secret'
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: 'ci-placeholder'
      NEXT_PUBLIC_SERVER_URL: 'http://localhost:5000'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run build

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-deps
      - run: npm run deps:check

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: '8.21.2'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Scan for secrets
        run: ./gitleaks detect --source=. --redact -v
